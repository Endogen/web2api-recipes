name: "Allen AI Playground"
slug: "allenai"
base_url: "https://playground.allenai.org"
description: "Chat with Allen AI's open-source models (OLMo, Tülu, Molmo)"
endpoints:
  chat:
    description: "Send a prompt to the default model (OLMo 3.1 32B Instruct)"
    requires_query: true
    url: "https://playground.allenai.org"
    params:
      tools_url:
        description: "MCP HTTP bridge URL for tool calling (GET /tools, POST /tools/{name})"
        required: false
        example: "http://localhost:8100"
    items:
      container: "body"
      fields:
        text:
          selector: ""
          attribute: "text"
    pagination:
      type: "page_param"
      param: "p"
      start: 1
